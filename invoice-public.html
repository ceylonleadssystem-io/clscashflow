<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Invoice</title>
  <style>
    :root{--ink:#181512;--muted:#716960;--line:#ddd6cc;--canvas:#f4f1ec}
    *{box-sizing:border-box}html,body{margin:0;max-width:100%;background:var(--canvas);color:var(--ink);font-family:Arial,Helvetica,sans-serif;letter-spacing:0}.toolbar{position:sticky;top:0;z-index:3;display:flex;justify-content:flex-end;gap:10px;padding:12px max(16px,calc((100% - 210mm)/2));background:rgba(244,241,236,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}button{appearance:none;border:1px solid var(--ink);background:var(--ink);color:#fff;padding:13px 18px;font:700 12px/1 Arial,sans-serif;text-transform:uppercase;letter-spacing:.12em;cursor:pointer}.paper-viewport{width:min(210mm,100%);margin:20px auto 36px;overflow:hidden}.paper-scale{position:relative;width:210mm;height:297mm;transform-origin:top left}.paper-scale iframe{display:block;width:210mm;height:297mm;border:0;background:#fff}.message{width:min(760px,calc(100% - 32px));margin:48px auto;background:#fff;border:1px solid var(--line);padding:52px 28px;text-align:center}.message h1{font:400 30px/1.2 Georgia,serif}.message p{color:var(--muted);line-height:1.6}.loading{color:var(--muted)}
    .message button{margin-top:16px}.loading::after{content:'';display:block;width:24px;height:24px;margin:22px auto 0;border:3px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:640px){.toolbar{padding:10px}.toolbar button{width:100%}.paper-viewport{margin:10px auto 24px}}
    @media print{body{background:#fff}.toolbar{display:none!important}.paper-viewport{width:210mm!important;height:297mm!important;margin:0!important;overflow:visible!important}.paper-scale{width:210mm!important;height:297mm!important;transform:none!important}}
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar" hidden><button id="download" type="button">Download PDF</button></div>
  <main id="app" class="message loading" role="status">Loading invoice...</main>
  <script src="/assets/platform.js?v=20260715-public-invoice-route-fix"></script>
  <script>
    (function(){
      var frame=null;
      function token(){var q=new URLSearchParams(location.search).get('token')||'';if(q)return q;var m=location.pathname.match(/\/(?:i|invoice)\/([^/]+)/);return m?decodeURIComponent(m[1]):'';}
      var loading=false;
      var rendered=false;
      function showLoading(){document.title='Loading invoice';document.getElementById('toolbar').hidden=true;var app=document.getElementById('app');app.className='message loading';app.textContent='Loading invoice...';}
      function unavailable(){document.title='Invoice unavailable';document.getElementById('toolbar').hidden=true;var app=document.getElementById('app');app.className='message';app.innerHTML='<h1>Invoice not found or unavailable</h1><p>Please try loading it again. If the problem continues, contact the business that sent it.</p><button id="retry" type="button">Try again</button>';var retry=document.getElementById('retry');if(retry)retry.addEventListener('click',function(){load(true);});}
      function fit(){var viewport=document.querySelector('.paper-viewport');var scale=document.querySelector('.paper-scale');if(!viewport||!scale)return;var ratio=Math.min(1,viewport.clientWidth/(210*96/25.4));scale.style.transform='scale('+ratio+')';viewport.style.height=(297*96/25.4*ratio)+'px';}
      function render(data){
        var inv={num:data.invoiceNumber,client:data.customerName,caddr:data.customerAddress,cemail:data.customerEmail,cphone:data.customerPhone,date:data.invoiceDate,due:data.dueDate,terms:data.terms,cur:data.currency,lines:(data.items||[]).map(function(item){return{desc:item.description,qty:item.quantity,price:item.unitPrice,total:item.total};}),sub:data.subtotal,vat:data.tax,discountAmount:data.discount,total:data.total,amount:data.total,paidAmount:Math.max(0,Number(data.total||0)-Number(data.outstanding||0)),status:data.status,notes:data.notes,tpl:data.templateIndex};
        var settings={biz:data.businessName,addr:data.businessAddress,email:data.businessEmail,vat:data.vatNumber,bankName:data.bankName,bankAccountName:data.bankAccountName,bankAccountNumber:data.bankAccountNumber,bankBranch:data.bankBranch,logo:data.businessLogo,defaultTpl:data.templateIndex,invoiceFont:data.invoiceFont,invoiceView:data.invoiceView,logoAlign:data.logoAlign,logoSize:data.logoSize,logoX:data.logoX,logoY:data.logoY};
        var html=window.clsBuildInvoicePrintHtml({inv:inv,settings:settings,templateIndex:data.templateIndex});
        document.title='Invoice '+data.invoiceNumber;
        document.getElementById('toolbar').hidden=false;
        var app=document.getElementById('app');app.className='paper-viewport';app.innerHTML='<div class="paper-scale"><iframe title="Invoice '+String(data.invoiceNumber||'')+'"></iframe></div>';
        frame=app.querySelector('iframe');frame.srcdoc=html;fit();
        rendered=true;
      }
      function wait(ms){return new Promise(function(resolve){setTimeout(resolve,ms);});}
      async function requestInvoice(value,attempt){
        var url='/.netlify/functions/public-invoice?token='+encodeURIComponent(value)+'&_='+(Date.now()+attempt);
        var res=await fetch(url,{headers:{Accept:'application/json'},cache:'no-store',credentials:'omit'});
        var json=await res.json().catch(function(){return{};});
        if(!res.ok||!json.ok||!json.invoice)throw new Error('not found');
        return json.invoice;
      }
      async function load(force){
        if(loading||(!force&&rendered))return;
        var value=token();
        if(!/^[A-Za-z0-9_-]{32,64}$/.test(value)){unavailable();return;}
        loading=true;showLoading();
        var delays=[0,700,1800];
        for(var attempt=0;attempt<delays.length;attempt+=1){
          if(delays[attempt])await wait(delays[attempt]);
          try{render(await requestInvoice(value,attempt));loading=false;return;}catch(error){}
        }
        loading=false;unavailable();
      }
      document.getElementById('download').addEventListener('click',function(){if(frame&&frame.contentWindow)frame.contentWindow.print();});
      addEventListener('resize',fit);
      addEventListener('pageshow',function(event){if(event.persisted||document.title==='Invoice unavailable')load(true);});
      load(false);
    })();
  </script>
</body>
</html>
