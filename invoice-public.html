<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Invoice</title>
  <style>
    :root{--ink:#1a1714;--muted:#6d655d;--line:#ded7cc;--paper:#fff;--canvas:#f5f2ed;--gold:#b8922a;--green:#1b8b55;--red:#bb3f35}
    *{box-sizing:border-box}html,body{max-width:100%}body{margin:0;background:var(--canvas);color:var(--ink);font-family:Arial,Helvetica,sans-serif;letter-spacing:0}.shell{width:min(920px,calc(100% - 32px));margin:32px auto}.toolbar{display:flex;justify-content:flex-end;margin-bottom:12px}.button{appearance:none;border:0;background:var(--ink);color:#fff;padding:13px 18px;font:700 12px/1 Arial,sans-serif;text-transform:uppercase;letter-spacing:.12em;cursor:pointer}.invoice{min-width:0;background:var(--paper);border:1px solid var(--line);padding:48px}.top{display:grid;grid-template-columns:1fr auto;gap:32px;padding-bottom:28px;border-bottom:3px solid var(--ink)}.brand-logo{display:block;max-width:170px;max-height:72px;object-fit:contain;margin-bottom:14px}.brand-name{font:400 30px/1.15 Georgia,serif}.invoice-title{text-align:right}.invoice-title h1{margin:0 0 10px;font-size:38px;line-height:1;text-transform:uppercase;letter-spacing:.12em}.invoice-number{font-weight:700}.parties{display:grid;grid-template-columns:1fr 1fr;gap:42px;padding:30px 0}.label{margin-bottom:9px;color:var(--gold);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.18em}.name{font-size:18px;font-weight:700}.detail{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.65}.status{display:inline-flex;margin-top:12px;padding:7px 10px;border:1px solid currentColor;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em}.status.paid{color:var(--green)}.status.overdue{color:var(--red)}.status.partial{color:var(--gold)}table{width:100%;border-collapse:collapse;table-layout:fixed}th{padding:11px 10px;border-bottom:2px solid var(--ink);font-size:10px;text-align:left;text-transform:uppercase;letter-spacing:.12em}td{padding:13px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}th:nth-child(1){width:52%}th:nth-child(n+2),td:nth-child(n+2){text-align:right}.summary{display:grid;grid-template-columns:1fr minmax(280px,40%);gap:36px;margin-top:28px}.summary-box{grid-column:2}.sum{display:flex;justify-content:space-between;gap:20px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}.sum.total{margin-top:8px;padding:15px;background:var(--ink);color:#fff;font-weight:700}.sum.outstanding{border-bottom:2px solid var(--gold);font-weight:700}.not-found{background:#fff;border:1px solid var(--line);padding:64px 28px;text-align:center}.not-found h1{font:400 30px/1.2 Georgia,serif}.not-found p{color:var(--muted)}.loading{padding:80px 20px;text-align:center;color:var(--muted)}
    @media(max-width:640px){body{overflow-x:hidden}.shell{width:100%;max-width:100%;margin:0;overflow:hidden}.toolbar{position:sticky;top:0;z-index:2;width:100%;margin:0;padding:10px;background:rgba(245,242,237,.95)}.invoice{width:100%;max-width:100%;border:0;padding:28px 18px;overflow:hidden}.top{grid-template-columns:minmax(0,1fr)}.invoice-title{text-align:left}.invoice-title h1{font-size:30px}.parties{grid-template-columns:minmax(0,1fr);gap:24px}.table-wrap{width:100%;max-width:100%;overflow:hidden}table,tbody,tr,td{display:block;width:100%;max-width:100%}thead{display:none}tr{padding:10px 0;border-top:2px solid var(--ink)}td,td:nth-child(n+2){display:grid;grid-template-columns:minmax(90px,35%) minmax(0,1fr);gap:12px;padding:7px 0;border:0;text-align:right;overflow-wrap:anywhere;word-break:break-word}td::before{content:attr(data-label);font-size:9px;font-weight:800;text-align:left;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}td:first-child{text-align:right}.summary{display:block}.summary-box{margin-top:24px}.sum{min-width:0}.sum span:last-child{white-space:nowrap}}
    @media print{@page{size:A4;margin:10mm}body{background:#fff}.shell{width:100%;margin:0}.toolbar{display:none!important}.invoice{border:0;padding:0}.top{padding-bottom:18px}.parties{padding:20px 0}.brand-logo{max-height:55px}.invoice-title h1{font-size:30px}th{padding:8px}td{padding:9px 8px}.summary{margin-top:20px}.not-found{border:0}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="toolbar" id="toolbar" hidden><button class="button" type="button" onclick="window.print()">Download PDF</button></div>
    <div id="app" class="loading" role="status">Loading invoice...</div>
  </main>
  <script>
    (function(){
      function esc(value){return String(value==null?'':value).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});}
      function amount(value,currency){return esc(currency)+' '+Number(value||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
      function date(value){if(!value)return 'Not specified';var d=new Date(String(value).slice(0,10)+'T00:00:00');return isNaN(d.getTime())?esc(value):new Intl.DateTimeFormat('en-GB',{day:'numeric',month:'short',year:'numeric'}).format(d);}
      function token(){var query=new URLSearchParams(location.search).get('token')||'';if(query)return query;var match=location.pathname.match(/\/i\/([^/]+)/);return match?decodeURIComponent(match[1]):'';}
      function notFound(){document.title='Invoice unavailable';document.getElementById('toolbar').hidden=true;document.getElementById('app').className='not-found';document.getElementById('app').innerHTML='<h1>Invoice not found or unavailable</h1><p>Please check the link or contact the business that sent it.</p>';}
      function render(inv){
        document.title='Invoice '+inv.invoiceNumber;
        var rows=(inv.items||[]).map(function(item){return '<tr><td data-label="Description">'+esc(item.description)+'</td><td data-label="Quantity">'+esc(item.quantity)+'</td><td data-label="Unit price">'+amount(item.unitPrice,inv.currency)+'</td><td data-label="Amount">'+amount(item.total,inv.currency)+'</td></tr>';}).join('');
        document.getElementById('toolbar').hidden=false;
        document.getElementById('app').className='invoice';
        document.getElementById('app').innerHTML='<header class="top"><div>'+(inv.businessLogo?'<img class="brand-logo" src="'+esc(inv.businessLogo)+'" alt="">':'')+'<div class="brand-name">'+esc(inv.businessName)+'</div></div><div class="invoice-title"><h1>Invoice</h1><div class="invoice-number">#'+esc(inv.invoiceNumber)+'</div></div></header><section class="parties"><div><div class="label">Bill to</div><div class="name">'+esc(inv.customerName)+'</div><span class="status '+esc(inv.status)+'">'+esc(inv.status)+'</span></div><div><div class="label">Invoice details</div><div class="detail"><strong>Invoice date:</strong> '+date(inv.invoiceDate)+'<br><strong>Due date:</strong> '+date(inv.dueDate)+'</div></div></section><div class="table-wrap"><table><thead><tr><th>Description</th><th>Qty</th><th>Unit price</th><th>Amount</th></tr></thead><tbody>'+rows+'</tbody></table></div><section class="summary"><div class="summary-box"><div class="sum"><span>Subtotal</span><strong>'+amount(inv.subtotal,inv.currency)+'</strong></div>'+(inv.discount?'<div class="sum"><span>Discount</span><strong>- '+amount(inv.discount,inv.currency)+'</strong></div>':'')+(inv.tax?'<div class="sum"><span>Tax</span><strong>'+amount(inv.tax,inv.currency)+'</strong></div>':'')+'<div class="sum total"><span>Total</span><span>'+amount(inv.total,inv.currency)+'</span></div><div class="sum outstanding"><span>Outstanding</span><span>'+amount(inv.outstanding,inv.currency)+'</span></div></div></section>';
      }
      var value=token();if(!/^[A-Za-z0-9_-]{32,64}$/.test(value)){notFound();return;}
      fetch('/.netlify/functions/public-invoice?token='+encodeURIComponent(value),{headers:{Accept:'application/json'}}).then(function(res){return res.json().then(function(json){if(!res.ok||!json.ok)throw new Error('not found');return json;});}).then(function(json){render(json.invoice);}).catch(notFound);
    })();
  </script>
</body>
</html>
