[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/mrs-gamage-story"
  to = "/mrs-gamage-story.html"
  status = 200

[[redirects]]
  from = "/join-the-movement"
  to = "/mrs-gamage-story.html"
  status = 200

[[redirects]]
  from = "/i/:token"
  to = "/invoice-public.html?token=:token"
  status = 200

# Standard security headers (no restrictive CSP, so inline scripts keep working)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Versioned application assets can stay in the browser cache between portal
# pages. Netlify purges its edge cache on each deploy, while query-string
# versions in the HTML move browsers to updated JavaScript immediately.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, durable, max-age=31536000, immutable"

# A short browser cache makes switching Solo, Studio, and Business feel
# immediate without leaving users on stale HTML after an update.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"
    Netlify-CDN-Cache-Control = "public, durable, max-age=3600, stale-while-revalidate=86400"
