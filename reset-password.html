<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | CeylonryLabs.io</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F3EA;--paper:#fff;--ink:#2F261F;--muted:#7A6D61;--gold:#B8922A;--border:#E5D9C8;--red:#C0392B;--green:#1D9E62}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;display:grid;place-items:center;padding:1.25rem}
  .shell{width:min(520px,100%);background:var(--paper);border:1px solid var(--border);padding:2.2rem;box-shadow:0 24px 80px rgba(47,38,31,.12)}
  .brand{font-family:'Cormorant Garamond',serif;font-size:2rem;line-height:1;margin-bottom:.2rem}
  .brand b{color:var(--gold);font-weight:600}
  .eyebrow{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:#A89A8B;font-weight:700;margin-bottom:2rem}
  h1{font-family:'Cormorant Garamond',serif;font-size:2.4rem;line-height:1.05;font-weight:400;margin:0 0 .75rem}
  p{margin:0 0 1.4rem;color:var(--muted);line-height:1.65}
  label{display:block;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--muted);margin:.95rem 0 .4rem}
  input{width:100%;border:1px solid var(--border);background:#fff;padding:1rem;font:inherit;color:var(--ink);outline:none}
  input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,146,42,.13)}
  .password-wrap{position:relative}
  .password-wrap input{padding-right:4.8rem}
  .password-toggle{position:absolute;right:.45rem;top:50%;transform:translateY(-50%);width:auto;min-width:3.7rem;margin:0;padding:.55rem .65rem;border:1px solid var(--border);background:#fff;color:var(--ink);font-size:.66rem;letter-spacing:.08em}
  .password-toggle:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  button{width:100%;margin-top:1.25rem;background:#1A1714;color:#fff;border:0;padding:1rem;font-family:'DM Sans',sans-serif;font-weight:800;font-size:.76rem;letter-spacing:.16em;text-transform:uppercase;cursor:pointer}
  button:disabled{opacity:.55;cursor:wait}
  .msg{display:none;margin-top:1rem;padding:.9rem 1rem;border:1px solid rgba(192,57,43,.22);background:rgba(192,57,43,.07);color:var(--red);font-size:.82rem;line-height:1.5}
  .msg.ok{border-color:rgba(29,158,98,.24);background:rgba(29,158,98,.08);color:var(--green)}
  .msg.show{display:block}
  .back{display:inline-block;margin-top:1.1rem;color:var(--muted);text-decoration:none;font-size:.84rem}
  @media(max-width:520px){.shell{padding:1.4rem}h1{font-size:2rem}}
</style>
</head>
<body>
  <main class="shell">
    <div class="brand">Ceylonry<b>Labs</b>.io</div>
    <div class="eyebrow">Cashflow System</div>
    <h1>Set a new password</h1>
    <p>Enter your new password below. After it is saved, sign in again with the updated password.</p>
    <label for="new-password">New Password</label>
    <div class="password-wrap"><input id="new-password" type="password" minlength="8" autocomplete="new-password" placeholder="Min 8 characters"><button class="password-toggle" type="button" data-password-target="new-password" aria-label="Show new password" aria-pressed="false">Show</button></div>
    <label for="confirm-password">Confirm Password</label>
    <div class="password-wrap"><input id="confirm-password" type="password" minlength="8" autocomplete="new-password" placeholder="Repeat password"><button class="password-toggle" type="button" data-password-target="confirm-password" aria-label="Show confirmed password" aria-pressed="false">Show</button></div>
    <button id="save-password" type="button">Save New Password</button>
    <div class="msg" id="reset-msg"></div>
    <a class="back" href="signin.html">Back to sign in</a>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0"></script>
<script>
(function(){
  var client = null;
  var msg = document.getElementById('reset-msg');
  var btn = document.getElementById('save-password');

  function show(text, ok){
    msg.textContent = text;
    msg.className = 'msg show' + (ok ? ' ok' : '');
  }

  document.querySelectorAll('[data-password-target]').forEach(function(toggle){
    toggle.addEventListener('click', function(){
      var input = document.getElementById(toggle.getAttribute('data-password-target'));
      if (!input) return;
      var revealing = input.type === 'password';
      input.type = revealing ? 'text' : 'password';
      toggle.textContent = revealing ? 'Hide' : 'Show';
      toggle.setAttribute('aria-pressed', revealing ? 'true' : 'false');
      toggle.setAttribute('aria-label', (revealing ? 'Hide ' : 'Show ') + (input.id === 'new-password' ? 'new password' : 'confirmed password'));
    });
  });

  async function getClient(){
    if (client) return client;
    var res = await fetch('/.netlify/functions/supabase-config', { cache: 'no-store' });
    var cfg = await res.json();
    if (!res.ok || !cfg.ok) throw new Error(cfg.error || 'Supabase is not configured.');
    client = window.supabase.createClient(cfg.url, cfg.anonKey, {
      auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
    });
    await client.auth.getSession();
    return client;
  }

  btn.addEventListener('click', async function(){
    var password = document.getElementById('new-password').value;
    var confirm = document.getElementById('confirm-password').value;
    if (!password || password.length < 8) { show('Password must be at least 8 characters.', false); return; }
    if (password !== confirm) { show('Passwords do not match.', false); return; }
    btn.disabled = true;
    btn.textContent = 'Saving...';
    try {
      var supabase = await getClient();
      var out = await supabase.auth.updateUser({ password: password });
      if (out.error) throw out.error;
      show('Password updated. Redirecting to sign in...', true);
      setTimeout(function(){
        supabase.auth.signOut().finally(function(){ window.location.href = 'signin.html'; });
      }, 900);
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Save New Password';
      show(err && err.message ? err.message : 'Could not update password. Open the latest reset link and try again.', false);
    }
  });

  getClient().catch(function(err){ show(err.message || 'Invalid or expired reset link. Request a fresh reset email.', false); });
})();
</script>
</body>
</html>
