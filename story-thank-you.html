<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Submitted | Cashflow System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F1E8;--brown:#4A3B2A;--gold:#B8923E;--muted:#6F6353;--card:#FDFAF4;--line:#E5D9C9;--serif:"Fraunces",serif;--sans:"Inter",sans-serif}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--cream);color:var(--brown);font-family:var(--sans)}
.card{width:min(680px,calc(100% - 32px));background:var(--card);border:1px solid var(--line);border-radius:34px;padding:48px;text-align:center}
.label{margin:0 0 18px;color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:500}
h1{font-family:var(--serif);font-size:clamp(42px,7vw,74px);line-height:1;margin:0;font-weight:400;letter-spacing:-.8px}
p{margin:22px auto 0;max-width:520px;color:var(--muted);font-size:17px;line-height:1.7}
.actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:30px}
a{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--gold);border-radius:999px;padding:13px 22px;color:var(--brown);text-decoration:none;font-weight:500}
a.primary{background:var(--gold);color:var(--card)}
</style>
</head>
<body>
  <main class="card">
    <p class="label">Submission received</p>
    <h1>Thank you for sharing your story.</h1>
    <p>Our team has received your submission. If your business aligns with future opportunities, we may contact you for the next step.</p>
    <div class="actions">
      <a class="primary" href="index.html">Back to home</a>
      <a href="mrs-gamage-story.html">Return to story</a>
    </div>
  </main>
</body>
</html>
