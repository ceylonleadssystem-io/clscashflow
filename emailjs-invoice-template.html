<!-- =========================================================
  CeylonryLabs.io - EmailJS Invoice Email Template (SIMPLE)
  Payment reminders and payment-received thank-you emails are built
  inside the app and sent as one HTML variable. Keep this EmailJS
  template clean: it only needs to render message_html.

  HOW TO SET UP (one time):
  1. In EmailJS, create a template.
  2. Switch the content editor to the  </>  Code / HTML view.
  3. DELETE everything in the content box and paste ONLY this line:

        {{{message_html}}}

     (Three curly braces — this tells EmailJS to render the HTML.)

  4. In the template's fields set:
        To Email  : {{to_email}}  (or {{user_email}} if your template already uses that)
        From Name : {{from_name}}
        Reply To  : {{reply_to}}
        Subject   : {{subject}}
  5. Save, copy the Template ID, and paste it (with your Service ID
     and Public Key) into your app: Settings > Invoices > EmailJS Payment Reminder.

  IMPORTANT:
  - Do not paste the EmailJS private key in the app or GitHub.
  - If browser sending is blocked, add EMAILJS_PRIVATE_KEY only in Netlify
    environment variables for the server fallback.
  ========================================================= -->
{{{message_html}}}
